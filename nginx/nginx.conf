events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # General API rate limit: 10 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Conditional rate limiting maps for write operations (POST)
    map $request_method $user_create_key {
        POST     $binary_remote_addr;
        default  "";
    }

    map $request_method $order_create_key {
        POST     $binary_remote_addr;
        default  "";
    }

    # Strict limit for user creation (POST only): 2 requests/sec per IP
    limit_req_zone $user_create_key zone=user_create_limit:10m rate=2r/s;

    # Order creation (POST only): 5 requests/sec per IP  
    limit_req_zone $order_create_key zone=order_create_limit:10m rate=5r/s;

    server {
        listen 80;

        # Rate Limit Error Handling
        error_page 429 /rate_limit_error.json;
        location = /rate_limit_error.json {
            return 429 '{"error": "Rate limit exceeded", "message": "Too many requests. Please retry after 1 second.", "status": 429}';
            add_header Content-Type application/json always;
        }

        # User Service Health
        location = /api/users/health {
            proxy_pass http://user-service:8001/health;
        }

        # User Service
        location /api/users {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req zone=user_create_limit burst=2 nodelay;
            limit_req_status 429;
            add_header X-RateLimit-Limit $limit_req_status always;
            
            proxy_pass http://user-service:8001/users;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Order Service Health
        location = /api/orders/health {
            proxy_pass http://order-service:8002/health;
        }

        # Order Service
        location /api/orders {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req zone=order_create_limit burst=5 nodelay;
            limit_req_status 429;
            add_header X-RateLimit-Limit $limit_req_status always;
            
            proxy_pass http://order-service:8002/orders;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Notification Service Health
        location = /api/notifications/health {
            proxy_pass http://notification-service:8003/health;
        }

        # Notification Service
        location /api/notifications {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            add_header X-RateLimit-Limit $limit_req_status always;

            proxy_pass http://notification-service:8003/notifications;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Analytics Service Health
        location = /api/analytics/health {
            proxy_pass http://analytics-service:8004/health;
        }

        # Analytics Service
        location /api/analytics {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            add_header X-RateLimit-Limit $limit_req_status always;

            proxy_pass http://analytics-service:8004/analytics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Generic /api/ fallback
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            add_header X-RateLimit-Limit $limit_req_status always;
        }

        # WebSocket EventBus
        location /ws {
            proxy_pass http://eventbus:8005/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
