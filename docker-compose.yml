services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - order-service
      - notification-service
      - analytics-service
      - eventbus
    networks:
      - devflow-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - devflow-net

  postgres-users:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    networks:
      - devflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-orders:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orders_db
    ports:
      - "5433:5432"
    networks:
      - devflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-notifications:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notifications_db
    ports:
      - "5434:5432"
    networks:
      - devflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d notifications_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-analytics:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: analytics_db
    ports:
      - "5435:5432"
    networks:
      - devflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build: ./services/user-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-users:5432/users_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres-users:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - devflow-net

  order-service:
    build: ./services/order-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-orders:5432/orders_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres-orders:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - devflow-net

  notification-service:
    build: ./services/notification-service
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-notifications:5432/notifications_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres-notifications:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - devflow-net

  analytics-service:
    build: ./services/analytics-service
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-analytics:5432/analytics_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres-analytics:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - devflow-net

  eventbus:
    build: ./services/eventbus
    ports:
      - "8005:8005"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - devflow-net

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8080
        - VITE_WS_URL=ws://localhost:8080/ws
    ports:
      - "3000:3000"
    networks:
      - devflow-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - user-service
      - order-service
      - notification-service
      - analytics-service
      - eventbus
    networks:
      - devflow-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: devflow123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - devflow-net

networks:
  devflow-net:
    driver: bridge
